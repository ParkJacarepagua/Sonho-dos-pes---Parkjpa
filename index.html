<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f2f0ed;font-family:'Montserrat',sans-serif;color:#1a1a1a;min-height:100vh}

.hlogo-img{height:48px;object-fit:contain;filter:none}

.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:.62rem;text-transform:uppercase;letter-spacing:.13em;color:#c9956a;font-weight:600}
select,.sinp{border:1px solid #ddd;border-radius:3px;padding:7px 10px;font-family:'Montserrat',sans-serif;font-size:.78rem;color:#1a1a1a;background:#fff;transition:border-color .2s}

.sinp{width:100%}

.wrap{padding:28px 40px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px}
.empty{text-align:center;padding:80px 20px;color:#999;grid-column:1/-1;font-size:.9rem;letter-spacing:.04em}
.empty span{font-size:2.2rem;display:block;margin-bottom:12px}

.card{background:#fff;border-radius:2px;overflow:hidden;display:flex;flex-direction:column;position:relative;transition:box-shadow .25s}
.card:hover{box-shadow:0 8px 32px rgba(0,0,0,.1)}
.badge{position:absolute;top:12px;left:12px;background:#fff;color:#c9956a;font-size:.62rem;font-weight:600;letter-spacing:.08em;padding:3px 10px;border-radius:20px;border:1px solid #c9956a;z-index:2;text-transform:uppercase}
.cimg{width:100%;aspect-ratio:1;object-fit:cover;background:#f8f6f3;display:block}
.cbody{padding:12px 14px;flex:1;display:flex;flex-direction:column;gap:5px}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;gap:4px}
.cmod{font-size:.6rem;color:#c9956a;font-weight:600;text-transform:uppercase;letter-spacing:.1em}
.cref{font-size:.6rem;color:#bbb;letter-spacing:.06em}
.cdesc{font-size:.82rem;line-height:1.4;color:#1a1a1a;font-weight:400;margin-top:1px}
.cprice{display:flex;align-items:baseline;gap:8px;margin-top:3px;flex-wrap:wrap}
.porig{font-size:.72rem;color:#bbb;text-decoration:line-through}
.patual{font-size:1.08rem;color:#1a1a1a;font-weight:500}
.pnorm{font-size:1.05rem;color:#1a1a1a;font-weight:500}
.cores{display:flex;flex-wrap:wrap;gap:3px;margin-top:1px}
.ctag{font-size:.6rem;padding:2px 7px;border-radius:20px;background:#f8f6f3;border:1px solid #e8e4df;color:#888;white-space:nowrap}
.ctag.more{color:#c9956a;border-color:#c9956a;background:#fff}
.slbl{font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:#bbb;margin-bottom:3px;margin-top:2px}
.tams{display:flex;flex-wrap:wrap;gap:3px}
.ttag{font-size:.68rem;padding:3px 8px;border-radius:2px;background:#f8f6f3;border:1px solid #e8e4df;color:#444;font-weight:500}
.cfoot{padding:10px 14px 13px}
.bwa{display:flex;align-items:center;justify-content:center;gap:7px;background:#c9956a;color:#fff;border:none;border-radius:2px;padding:9px 14px;font-size:.72rem;font-weight:600;cursor:pointer;text-decoration:none;font-family:'Montserrat',sans-serif;letter-spacing:.1em;text-transform:uppercase;transition:background .2s;width:100%}
.bwa:hover{background:#b5804f}

@media(max-width:600px){
  header{padding:16px 18px}

  .wrap{padding:16px 13px}

  .section-title{font-size:1.1rem}
}
</style>

function brl(v){return(v==null)?"":v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
function pct(po,pa){if(!po||!pa||pa>=po)return 0;return Math.round((1-pa/po)*100)}

const modelos=[...new Set(PRODUCTS.map(p=>p.modelo))].sort();
const allTams=["33","33/34","34","35","35/36","36","37","37/38","38","39","39/40","40","G","GG","M","P","PP","U"];
const tamanhos=allTams.filter(s=>PRODUCTS.some(p=>p.tamanhos.includes(s)));

const fm=document.getElementById("fm");
const ft=document.getElementById("ft");
const fo=document.getElementById("fo");
const fs=document.getElementById("fs");

modelos.forEach(m=>fm.add(new Option(m,m)));
tamanhos.forEach(t=>ft.add(new Option(t,t)));


function limpar(){fm.value="";ft.value="";fo.value="";fs.value="";render()}

function waLink(p){
  const d=pct(p.po,p.pa);
  const pr=p.pa?brl(p.pa):brl(p.po);
  let msg="Olá! Vi o catálogo e tenho interesse no produto:\n";
  msg+="*Ref:* "+p.ref+"\n";
  msg+="*"+p.desc+"*\n";
  if(pr)msg+="*Preço:* "+pr;
  if(d)msg+=" *("+d+"% off)*";
  msg+="\nPoderia me dar mais informações?";
  return "https://wa.me/"+WA+"?text="+encodeURIComponent(msg);
}

function makeCard(p){
  const d=pct(p.po,p.pa);
  const cShow=p.cores.slice(0,4);
  const cMore=p.cores.length>4?p.cores.length-4:0;

  const div=document.createElement("div");
  div.className="card";

  let h="";
  if(d)h+=`<span class="badge">-${d}% OFF</span>`;
  h+=`<img class="cimg" src="${p.foto}" alt="${p.desc}" loading="lazy">`;
  h+=`<div class="cbody">`;
  h+=`<div class="ctop"><span class="cmod">${p.modelo}</span><span class="cref">Ref. ${p.ref}</span></div>`;
  h+=`<div class="cdesc">${p.desc}</div>`;
  h+=`<div class="cprice">`;
  if(d&&p.po)h+=`<span class="porig">${brl(p.po)}</span>`;
  if(p.pa)h+=`<span class="${d?"patual":"pnorm"}">${brl(p.pa)}</span>`;
  else if(p.po)h+=`<span class="pnorm">${brl(p.po)}</span>`;
  h+=`</div>`;
  h+=`<div class="cores">`;
  cShow.forEach(c=>{h+=`<span class="ctag">${c}</span>`});
  if(cMore)h+=`<span class="ctag more">+${cMore} cores</span>`;
  h+=`</div>`;
  h+=`<div><div class="slbl">Tamanhos disponíveis</div><div class="tams">`;
  p.tamanhos.forEach(t=>{h+=`<span class="ttag">${t}</span>`});
  h+=`</div></div></div>`;
  h+=`<div class="cfoot"><a class="bwa" href="${waLink(p)}" target="_blank" rel="noopener">`;

  h+=" Compre aqui</a></div>";

  const img=div.querySelector(".cimg");
  img.addEventListener("error",function(){div.remove()});

  return div;
}

function strip(s){return s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"")}

function render(){
  const m=fm.value,t=ft.value,o=fo.value;
  const s=strip(fs.value.trim());

  let filtered=PRODUCTS.filter(p=>{
    if(m&&p.modelo!==m)return false;
    if(t&&!p.tamanhos.includes(t))return false;
    if(s&&!strip(p.desc+" "+p.modelo+" "+p.ref).includes(s))return false;
    return true;
  });

  if(o==="desc_maior") filtered.sort((a,b)=>pct(b.po,b.pa)-pct(a.po,a.pa));
  else if(o==="desc_menor") filtered.sort((a,b)=>pct(a.po,a.pa)-pct(b.po,b.pa));
  else if(o==="preco_maior") filtered.sort((a,b)=>(b.pa||b.po||0)-(a.pa||a.po||0));
  else if(o==="preco_menor") filtered.sort((a,b)=>(a.pa||a.po||0)-(b.pa||b.po||0));

  const grid=document.getElementById("grid");
  grid.innerHTML="";
  if(!filtered.length){
    grid.innerHTML='<div class="empty"><span>🔍</span>Nenhum produto encontrado.</div>';
    return;
  }
  const frag=document.createDocumentFragment();
  filtered.forEach(p=>frag.appendChild(makeCard(p)));
  grid.appendChild(frag);
}


function fixFilterTop() {
  const h = document.querySelector('header');
  const f = document.querySelector('.filters');
  if (h && f) f.style.top = h.offsetHeight + 'px';
}
fixFilterTop();
window.addEventListener('resize', fixFilterTop);
fm.addEventListener("change",render);
ft.addEventListener("change",render);
fo.addEventListener("change",render);
fs.addEventListener("input",render);
render();
</script>
</body>
